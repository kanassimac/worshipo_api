<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花蓮靈糧堂 主日敬拜曲目</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:    #2E7EE8;
    --blue-dk: #1A5CBF;
    --blue-lt: #EBF2FD;
    --gray-1:  #F7F8FA;
    --gray-2:  #E8ECF0;
    --gray-3:  #B0BAC6;
    --gray-4:  #6B7A8D;
    --black:   #1A2130;
    --white:   #FFFFFF;
    --radius:  12px;
    --font:    -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
  }
  html, body { height: 100%; background: var(--gray-1); font-family: var(--font); color: var(--black); -webkit-font-smoothing: antialiased; font-size: 18px; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--white); }
  .header { background: var(--blue); color: var(--white); padding: 12px 20px; flex-shrink: 0; }
  .header-date { font-size: 18px; font-weight: 500; letter-spacing: 0.05em; opacity: 0.95; }
  .tabs { display: flex; background: var(--blue); padding: 0 12px; gap: 4px; }
  .tab-btn {
    flex: 1; padding: 10px 0;
    background: rgba(255,255,255,0.15); border: none; border-radius: 8px 8px 0 0;
    color: rgba(255,255,255,0.75); font-size: 18px; font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .tab-btn.active { background: var(--white); color: var(--blue); }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .tab-panel { display: none; padding: 16px 12px 32px; }
  .tab-panel.active { display: block; }
  .song-card {
    background: var(--white); border: 1px solid var(--gray-2);
    border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .song-name { padding: 10px 12px 0; font-size: 18px; font-weight: 700; color: var(--black); line-height: 1.4; }
  .song-label {
    font-size: 18px; font-weight: 500; color: var(--blue);
    background: var(--blue-lt); padding: 2px 7px;
    border-radius: 20px; display: inline-block; margin-bottom: 4px;
  }
  .player-wrap {
    position: relative; width: 100%; padding-top: 56.25%;
    background: #111; overflow: hidden;
  }
  .player-wrap > div,
  .player-wrap iframe {
    position: absolute !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
    border: none;
  }
  .player-loading {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.35); font-size: 18px; pointer-events: none;
    z-index: 1;
  }
  .no-embed {
    padding: 16px 14px 14px;
    background: var(--gray-1); text-align: center;
    border-top: 1px solid var(--gray-2);
  }
  .yt-link-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 10px;
    background: #FF0000; color: white;
    font-size: 18px; font-weight: 600; font-family: var(--font);
    text-decoration: none; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .yt-link-btn:active { background: #cc0000; }
  .no-embed-hint { margin-top: 8px; font-size: 18px; font-weight: 700; color: var(--black); line-height: 1.4; }
  .controls {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-top: 1px solid var(--gray-2);
  }
  .ctrl-btn {
    width: 44px; height: 44px; border-radius: 10px; border: none;
    background: var(--blue); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: var(--blue-dk); }
  .repeat-btn {
    width: 44px; height: 44px; border-radius: 10px; border: none;
    background: var(--blue); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .repeat-btn.on  { background: #E82E2E; }
  .repeat-btn:active { filter: brightness(0.85); }
  .share-btn {
    width: 44px; height: 44px; border-radius: 10px; border: none;
    background: #06C755; color: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .share-btn:active { background: #05a847; }
  .lyrics-btn {
    flex: 1; height: 44px; border-radius: 10px; border: none;
    background: var(--blue-lt); color: var(--blue);
    font-size: 18px; font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .lyrics-btn:active { background: #d5e6f9; }
  .lyrics-wrap {
    display: none; padding: 12px 14px 14px;
    border-top: 1px solid var(--gray-2);
    background: var(--gray-1); max-height: 340px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .lyrics-wrap.open { display: block; }
  .lyrics-text { font-size: 18px; line-height: 1.85; color: var(--black); white-space: pre-wrap; word-break: break-word; }
  .no-lyrics { font-size: 18px; color: var(--gray-3); font-style: italic; }
  .loading-state { padding: 48px 24px; text-align: center; color: var(--gray-4); font-size: 18px; }
  .loading-spinner {
    width: 32px; height: 32px; border: 3px solid var(--gray-2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { padding: 40px 24px; text-align: center; color: #c0392b; font-size: 18px; line-height: 1.6; }
  .no-songs { padding: 32px 16px; text-align: center; color: var(--gray-3); font-size: 18px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-date" id="header-date">載入中⋯</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('benta')">本堂</button>
    <button class="tab-btn"       onclick="switchTab('xinshu')">新秀</button>
  </div>
  <div class="content">
    <div class="tab-panel active" id="panel-benta">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div>載入資料中⋯</div>
      </div>
    </div>
    <div class="tab-panel" id="panel-xinshu"></div>
  </div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxW5gGmEl-ion7DqmQYTiBgrTphc4wsagT1LOsE3-G2aqKmtJ4LWwITlUFkcYV7WQg/exec';
const lyricsStore = {};
let liffReady = false;
(async () => {
  try {
    await liff.init({ liffId: '2007192009-Dpm9R8wG' });
    liffReady = true;
  } catch (e) {
    console.warn('LIFF init failed:', e);
  }
})();
let worshipData = null;
let ytApiReady = false;
const ytApiReadyCallbacks = [];
window.onYouTubeIframeAPIReady = function() {
  ytApiReady = true;
  ytApiReadyCallbacks.forEach(fn => fn());
  ytApiReadyCallbacks.length = 0;
};
function whenYTReady(fn) {
  if (ytApiReady) fn();
  else ytApiReadyCallbacks.push(fn);
}
const players = {};
async function canEmbed(youtubeId) {
  if (!youtubeId) return false;
  try {
    const res = await fetch(
      'https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v='
      + youtubeId + '&format=json'
    );
    return res.ok;
  } catch { return true; }
}
async function init() {
  try {
    const res = await fetch(`${API_URL}?t=${Date.now()}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    worshipData = await res.json();
    if (worshipData.error) throw new Error(worshipData.error);
    document.getElementById('header-date').textContent =
      (worshipData.date || '') + ' 主日敬拜曲目';
    await renderPanel('benta', worshipData.benta || []);
  } catch (err) {
    document.getElementById('panel-benta').innerHTML =
      '<div class="error-state">資料載入失敗<br><small style="font-size:18px">' + err.message + '</small></div>';
  }
}
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active',
      (i === 0 && tab === 'benta') || (i === 1 && tab === 'xinshu'));
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'xinshu' && worshipData) {
    const panel = document.getElementById('panel-xinshu');
    if (!panel.dataset.rendered) {
      panel.dataset.rendered = '1';
      renderPanel('xinshu', worshipData.xinshu || []);
    }
  }
}
async function renderPanel(tab, songs) {
  const panel = document.getElementById('panel-' + tab);
  if (!songs || songs.length === 0) {
    panel.innerHTML = '<div class="no-songs">本週暫無歌單資料</div>';
    return;
  }
  const embedChecks = await Promise.all(
    songs.map(s => s.youtubeId ? canEmbed(s.youtubeId) : Promise.resolve(false))
  );
  panel.innerHTML = songs.map((s, i) =>
    buildCard(tab + '-' + i, s, embedChecks[i])
  ).join('');
  songs.forEach((s, i) => {
    if (s.youtubeId && embedChecks[i]) {
      initYTPlayer(tab + '-' + i, s.youtubeId);
    }
  });
}
function buildCard(id, song, embedOk) {
  if (song.lyrics) {
    lyricsStore[id] = { name: song.name, lyrics: song.lyrics };
  }
  const isResponse = song.name.startsWith('回應');
  const labelStyle = isResponse ? 'color:#e67e22;background:#fef5ec' : '';
  const labelText  = isResponse ? '回應詩歌' : '敬拜';
  const hasVideo   = !!song.youtubeId;
  const hasLyrics  = !!song.lyrics;
  const ytUrl      = hasVideo ? 'https://www.youtube.com/watch?v=' + song.youtubeId : '#';
  let playerSection = '';
  if (hasVideo && !embedOk) {
    playerSection = `
      <div class="no-embed">
        <a class="yt-link-btn" href="${ytUrl}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/>
          </svg>
          點我到 YouTube 觀看
        </a>
        <div class="no-embed-hint">此影片版權設定不允許在外部網站播放</div>
      </div>`;
  } else if (hasVideo && embedOk) {
    playerSection = `
      <div class="player-wrap">
        <div class="player-loading" id="ploading-${id}">載入中⋯</div>
        <div id="ytplayer-${id}"></div>
      </div>`;
  }
  const ctrlBtns = (hasVideo && embedOk) ? `
    <button class="ctrl-btn" id="playbtn-${id}" title="播放／暫停"
            onclick="togglePlay('${id}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path id="icon-${id}" d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="repeat-btn" id="repeatbtn-${id}" title="單曲重複播放"
            onclick="toggleRepeat('${id}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
      </svg>
    </button>` : '';
  return `
<div class="song-card">
  <div class="song-name">
    <span class="song-label" style="${labelStyle}">${labelText}</span>
    <div>${song.name}</div>
  </div>
  ${playerSection}
  <div class="controls">
    ${ctrlBtns}
    <button class="lyrics-btn" onclick="toggleLyrics('${id}')" id="lbtn-${id}">
      ${hasLyrics ? '顯示歌詞' : '暫無歌詞'}
    </button>
    ${hasLyrics ? `
    <button class="share-btn" title="分享歌詞" onclick="shareLyrics('${id}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M18 16c-.8 0-1.5.3-2 .8l-7.3-4.2c.1-.2.1-.4.1-.6s0-.4-.1-.6L16 7.2c.5.5 1.2.8 2 .8 1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3c0 .2 0 .4.1.6L7.8 9.8C7.3 9.3 6.6 9 5.8 9c-1.7 0-3 1.3-3 3s1.3 3 3 3c.8 0 1.5-.3 2-.8l7.3 4.2c-.1.2-.1.4-.1.6 0 1.6 1.3 2.9 2.9 2.9s2.9-1.3 2.9-2.9S19.6 16 18 16z"/>
      </svg>
    </button>` : ''}
  </div>
  <div class="lyrics-wrap" id="lyrics-${id}">
    ${hasLyrics
      ? '<div class="lyrics-text">' + formatLyrics(song.lyrics) + '</div>'
      : '<div class="no-lyrics">歌詞資料暫未收錄</div>'
    }
  </div>
</div>`;
}
function initYTPlayer(id, youtubeId) {
  whenYTReady(function() {
    players[id] = { player: null, repeat: false };
    const ytPlayer = new YT.Player('ytplayer-' + id, {
      videoId: youtubeId,
      playerVars: { rel: 0, playsinline: 1, modestbranding: 1 },
      events: {
        onReady: function(e) {
          const loading = document.getElementById('ploading-' + id);
          if (loading) loading.remove();
          players[id].player = e.target;
        },
        onStateChange: function(e) {
          const st = players[id];
          if (!st) return;
          const state = e.data;
          if (state === YT.PlayerState.ENDED && st.repeat) {
            st.player.seekTo(0);
            st.player.playVideo();
            updatePlayIcon(id, true);
            return;
          }
          const isPlaying = (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING);
          updatePlayIcon(id, isPlaying);
        }
      }
    });
  });
}
function togglePlay(id) {
  const st = players[id];
  if (!st || !st.player) return;
  const state = st.player.getPlayerState();
  if (state === YT.PlayerState.PLAYING) {
    st.player.pauseVideo();
  } else {
    st.player.playVideo();
  }
}
function toggleRepeat(id) {
  const st  = players[id];
  const btn = document.getElementById('repeatbtn-' + id);
  if (!st || !btn) return;
  st.repeat = !st.repeat;
  btn.classList.toggle('on', st.repeat);
  btn.title = st.repeat ? '重複播放：開啟中' : '單曲重複播放';
  if (st.repeat && st.player) {
    const state = st.player.getPlayerState();
    if (state !== YT.PlayerState.PLAYING && state !== YT.PlayerState.BUFFERING) {
      st.player.playVideo();
    }
  }
}
function updatePlayIcon(id, isPlaying) {
  const icon = document.getElementById('icon-' + id);
  if (!icon) return;
  icon.setAttribute('d', isPlaying
    ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
    : 'M8 5v14l11-7z'
  );
}
async function shareLyrics(id) {
  const data = lyricsStore[id];
  if (!data) return;
  const text = data.name + '\n\n' + data.lyrics;
  if (liffReady && liff.isInClient()) {
    try {
      await liff.shareTargetPicker([{ type: 'text', text: text }]);
    } catch (e) {
      console.error('分享失敗:', e);
    }
    return;
  }
  if (navigator.share) {
    try {
      await navigator.share({ text: text });
    } catch (e) { /* 使用者取消 */ }
  } else {
    await navigator.clipboard.writeText(text);
    alert('歌詞已複製到剪貼簿');
  }
}
function toggleLyrics(id) {
  const wrap = document.getElementById('lyrics-' + id);
  const btn  = document.getElementById('lbtn-' + id);
  const open = wrap.classList.toggle('open');
  btn.textContent = open ? '隱藏歌詞' : '顯示歌詞';
}
function formatLyrics(raw) {
  return raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
init();
</script>
</body>
</html>
