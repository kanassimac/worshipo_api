<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花蓮靈糧堂 主日敬拜曲目</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #2E7EE8;
    --blue-dk: #1A5CBF;
    --blue-lt: #EBF2FD;
    --gray-1:  #F7F8FA;
    --gray-2:  #E8ECF0;
    --gray-3:  #B0BAC6;
    --gray-4:  #6B7A8D;
    --black:   #1A2130;
    --white:   #FFFFFF;
    --radius:  12px;
    --font:    -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--gray-1);
    font-family: var(--font);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Layout ===== */
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--white);
  }

  /* ===== Header ===== */
  .header {
    background: var(--blue);
    color: var(--white);
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 13px;
    opacity: 0.85;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .header-date {
    font-size: 26px;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: -0.5px;
  }

  .header-subtitle {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 2px;
    margin-bottom: 16px;
  }

  /* ===== Tabs ===== */
  .tabs {
    display: flex;
    background: var(--blue);
    padding: 0 12px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 0;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px 8px 0 0;
    color: rgba(255,255,255,0.75);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .tab-btn.active {
    background: var(--white);
    color: var(--blue);
  }

  /* ===== Content ===== */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tab-panel {
    display: none;
    padding: 16px 12px 32px;
  }

  .tab-panel.active {
    display: block;
  }

  /* ===== Song Card ===== */
  .song-card {
    background: var(--white);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* YouTube player 容器 */
  .player-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    background: #000;
  }

  .player-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .player-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    background: #111;
  }

  .player-placeholder svg {
    opacity: 0.5;
  }

  /* ===== Controls ===== */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--gray-2);
  }

  .ctrl-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: var(--blue);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active { background: var(--blue-dk); }

  .lyrics-btn {
    flex: 1;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: var(--blue-lt);
    color: var(--blue);
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .lyrics-btn:active { background: #d5e6f9; }

  /* ===== Song Name ===== */
  .song-name {
    padding: 10px 12px 0;
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.4;
  }

  .song-name .song-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    background: var(--blue-lt);
    padding: 2px 7px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 4px;
  }

  /* ===== Lyrics ===== */
  .lyrics-wrap {
    display: none;
    padding: 12px 14px 14px;
    border-top: 1px solid var(--gray-2);
    background: var(--gray-1);
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .lyrics-wrap.open { display: block; }

  .lyrics-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--black);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .lyrics-text .section-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .no-lyrics {
    font-size: 13px;
    color: var(--gray-3);
    font-style: italic;
  }

  /* ===== Loading / Error ===== */
  .loading-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--gray-4);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--gray-2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    padding: 40px 24px;
    text-align: center;
    color: #c0392b;
    font-size: 14px;
    line-height: 1.6;
  }

  .no-songs {
    padding: 32px 16px;
    text-align: center;
    color: var(--gray-3);
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">花蓮靈糧堂 主日敬拜</div>
    <div class="header-date" id="header-date">載入中⋯</div>
    <div class="header-subtitle">點擊歌曲可播放，點按鈕可查看歌詞</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('benta')">本堂</button>
    <button class="tab-btn"       onclick="switchTab('xinshu')">新秀</button>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-benta">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div>載入資料中⋯</div>
      </div>
    </div>
    <div class="tab-panel" id="panel-xinshu">
      <!-- 切換時才載入 -->
    </div>
  </div>
</div>

<script>
// =============================================
// 設定：把 GAS Web App 的部署 URL 填在這裡
// =============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxW5gGmEl-ion7DqmQYTiBgrTphc4wsagT1LOsE3-G2aqKmtJ4LWwITlUFkcYV7WQg/exec';
// =============================================

let worshipData = null;
let currentTab = 'benta';
const players = {}; // { cardId: player }

// ===== 載入資料 =====
async function init() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    worshipData = await res.json();

    if (worshipData.error) throw new Error(worshipData.error);

    // 更新日期
    const dateEl = document.getElementById('header-date');
    dateEl.textContent = worshipData.date
      ? worshipData.date + ' 主日'
      : '本週主日';

    // 渲染本堂
    renderPanel('benta', worshipData.benta || []);

  } catch (err) {
    document.getElementById('panel-benta').innerHTML =
      '<div class="error-state">資料載入失敗<br><small>' + err.message + '</small></div>';
  }
}

// ===== 切換 Tab =====
function switchTab(tab) {
  currentTab = tab;

  // 更新按鈕
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'benta') || (i === 1 && tab === 'xinshu'));
  });

  // 更新面板
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  // 若新秀還沒渲染
  if (tab === 'xinshu' && worshipData) {
    const panel = document.getElementById('panel-xinshu');
    if (!panel.dataset.rendered) {
      renderPanel('xinshu', worshipData.xinshu || []);
      panel.dataset.rendered = '1';
    }
  }
}

// ===== 渲染面板 =====
function renderPanel(tab, songs) {
  const panel = document.getElementById('panel-' + tab);

  if (!songs || songs.length === 0) {
    panel.innerHTML = '<div class="no-songs">本週暫無歌單資料</div>';
    return;
  }

  let html = '';
  songs.forEach((song, idx) => {
    const cardId = tab + '-' + idx;
    const isResponse = song.name.startsWith('回應');
    html += buildSongCard(cardId, song, isResponse);
  });

  panel.innerHTML = html;
}

// ===== 建立歌曲卡片 =====
function buildSongCard(cardId, song, isResponse) {
  const hasVideo = !!song.youtubeId;
  const hasLyrics = !!song.lyrics;

  const labelText = isResponse ? '回應詩歌' : '敬拜';
  const labelColor = isResponse ? 'color: #e67e22; background: #fef5ec' : '';

  return `
<div class="song-card" id="card-${cardId}">
  <div class="song-name">
    <span class="song-label" style="${labelColor}">${labelText}</span>
    <div>${song.name}</div>
  </div>

  <div class="player-wrap" id="player-wrap-${cardId}">
    ${hasVideo
      ? `<div class="player-placeholder" id="placeholder-${cardId}" onclick="loadPlayer('${cardId}','${song.youtubeId}')">
           <svg width="48" height="48" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
           <span>點擊播放</span>
         </div>`
      : `<div class="player-placeholder"><span style="font-size:12px">無 YouTube 連結</span></div>`
    }
  </div>

  <div class="controls">
    ${hasVideo
      ? `<button class="ctrl-btn" title="播放/暫停" onclick="togglePlay('${cardId}','${song.youtubeId}')">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path id="icon-${cardId}" d="M8 5v14l11-7z"/></svg>
         </button>
         <button class="ctrl-btn" title="重播" onclick="replayVideo('${cardId}','${song.youtubeId}')">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
         </button>`
      : `<button class="ctrl-btn" disabled style="opacity:0.35" title="無連結">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
         </button>`
    }
    <button class="lyrics-btn" onclick="toggleLyrics('${cardId}')" id="lyrics-btn-${cardId}">
      ${hasLyrics ? '顯示歌詞' : '暫無歌詞'}
    </button>
  </div>

  <div class="lyrics-wrap" id="lyrics-${cardId}">
    ${hasLyrics
      ? `<div class="lyrics-text">${formatLyrics(song.lyrics)}</div>`
      : `<div class="no-lyrics">歌詞資料暫未收錄</div>`
    }
  </div>
</div>`;
}

// ===== 格式化歌詞 =====
function formatLyrics(raw) {
  if (!raw) return '';

  // 將 Verse/Chorus/Bridge/Pre Chorus/Intro 等標籤高亮
  const sectionLabels = /^(Blank|Intro|Verse\s*\d*|Pre\s*Chorus|Chorus\s*\d*|Bridge\s*\d*|Ending|Tag|Pre\s*Chorus\s*\d*)$/im;

  const escaped = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  const lines = escaped.split('\n');
  const result = lines.map(line => {
    const trimmed = line.trim();
    if (sectionLabels.test(trimmed)) {
      return '<span class="section-label">' + trimmed + '</span>';
    }
    return line;
  });

  return result.join('\n');
}

// ===== YouTube Player 控制 =====
// 使用 iframe API（無 JS API 版本），透過 src 控制

function loadPlayer(cardId, youtubeId) {
  const wrap = document.getElementById('player-wrap-' + cardId);
  const placeholder = document.getElementById('placeholder-' + cardId);

  // 隱藏 placeholder，嵌入 iframe（autoplay=1）
  if (placeholder) placeholder.style.display = 'none';

  // 若已有 iframe 就不重建
  if (wrap.querySelector('iframe')) return;

  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&playsinline=1&enablejsapi=1`;
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  iframe.id = 'iframe-' + cardId;
  wrap.appendChild(iframe);

  players[cardId] = { iframe, youtubeId, playing: true };
  updatePlayIcon(cardId, true);
}

function togglePlay(cardId, youtubeId) {
  const state = players[cardId];

  // 若尚未載入，先載入並播放
  if (!state) {
    loadPlayer(cardId, youtubeId);
    return;
  }

  // 已載入：用 postMessage 控制
  if (state.playing) {
    state.iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
    state.playing = false;
  } else {
    state.iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    state.playing = true;
  }
  updatePlayIcon(cardId, state.playing);
}

function replayVideo(cardId, youtubeId) {
  const state = players[cardId];
  if (!state) {
    loadPlayer(cardId, youtubeId);
    return;
  }
  // 重載 iframe 以重播
  state.iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&playsinline=1&enablejsapi=1`;
  state.playing = true;
  updatePlayIcon(cardId, true);
}

function updatePlayIcon(cardId, isPlaying) {
  const iconEl = document.getElementById('icon-' + cardId);
  if (!iconEl) return;
  // 播放中：顯示暫停圖示；暫停中：顯示播放圖示
  iconEl.setAttribute('d', isPlaying
    ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'  // pause
    : 'M8 5v14l11-7z'                       // play
  );
}

// ===== 顯示/隱藏歌詞 =====
function toggleLyrics(cardId) {
  const lyricsWrap = document.getElementById('lyrics-' + cardId);
  const btn = document.getElementById('lyrics-btn-' + cardId);

  const isOpen = lyricsWrap.classList.contains('open');
  lyricsWrap.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '顯示歌詞' : '隱藏歌詞';
}

// ===== 啟動 =====
init();
</script>
</body>
</html>
